services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    image: deneb-backend/deneb:latest
    volumes:
      - storage_data:/var/www/html/storage
    env_file:
      - .env
    environment:
      - AUTORUN_ENABLED=true
      - AUTORUN_LARAVEL_MIGRATION_ISOLATION=true
      - HEALTHCHECK_PATH=/up
    networks:
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --insecure --silent --location --show-error --fail http://localhost:8080$${HEALTHCHECK_PATH:-/up} || exit 1",
        ]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 5

  queue-worker:
    image: deneb-backend/deneb:latest
    command: php artisan queue:work
    stop_signal: SIGTERM
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "healthcheck-queue"]
      start_period: 10s
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - storage_data:/var/www/html/storage
    env_file:
      - .env
    networks:
      - dokploy-network
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 2 # Change this number based on your load requirements
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  scheduler-worker:
    container_name: scheduler
    image: deneb-backend/deneb:latest
    command: php artisan schedule:work
    stop_signal: SIGTERM
    stop_grace_period: 10s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck-schedule"]
      start_period: 10s
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - storage_data:/var/www/html/storage
    env_file:
      - .env
    networks:
      - dokploy-network
volumes:
  storage_data:
networks:
  dokploy-network:
    external: true
